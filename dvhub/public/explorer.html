<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DVhub Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0F1A">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/assets/dvhub.jpg" alt="DVhub Logo" style="width:28px;height:28px;border-radius:6px;object-fit:contain;">
        <span>DVhub</span>
      </div>
      <input type="checkbox" id="menuToggle" class="menu-toggle-cb" aria-hidden="true">
      <label for="menuToggle" class="topbar-burger" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </label>
      <nav class="topbar-nav" aria-label="Hauptnavigation">
        <a href="/">Leitstand</a>
        <a href="/history.html">Historie</a>
        <a class="is-active" href="/explorer.html">Explorer</a>
        <a href="/settings.html">Einrichtung</a>
        <a href="/tools.html">Wartung</a>
      </nav>
      <div class="topbar-right"></div>
    </header>

    <main class="page-content">
      <!-- Page header -->
      <div class="page-header-card">
        <div class="page-header-card-copy">
          <p class="page-kicker">Explorer</p>
          <h1>Daten-Explorer</h1>
          <p class="page-subtitle">Alle Messwerte frei kombinierbar mit Zoom, Pan und CSV-Export.</p>
        </div>
      </div>

      <!-- Explorer card -->
      <div class="sub-card">
        <div class="explorer-controls">
          <div class="explorer-control">
            <label>Zeitbereich</label>
            <select id="explorerRange">
              <option value="today">Heute</option>
              <option value="yesterday">Gestern</option>
              <option value="7d" selected>Letzte 7 Tage</option>
              <option value="30d">Letzte 30 Tage</option>
              <option value="custom">Benutzerdefiniert</option>
            </select>
          </div>
          <div class="explorer-control" id="customStartWrap" style="display:none">
            <label>Von</label>
            <input type="date" id="explorerStart" />
          </div>
          <div class="explorer-control" id="customEndWrap" style="display:none">
            <label>Bis</label>
            <input type="date" id="explorerEnd" />
          </div>
          <div class="explorer-control">
            <label>Aggregation</label>
            <select id="explorerAgg">
              <option value="15min" selected>15 Minuten</option>
              <option value="1h">1 Stunde</option>
              <option value="day">Tag</option>
            </select>
          </div>
          <div class="explorer-control">
            <button class="btn btn-primary" id="explorerLoadBtn">Laden</button>
          </div>
          <div class="explorer-control">
            <button class="btn btn-ghost" id="explorerResetZoomBtn">Zoom Reset</button>
          </div>
        </div>

        <div id="explorerSeriesChips" class="explorer-series-grid"></div>

        <div class="explorer-chart-wrap">
          <canvas id="explorerCanvas"></canvas>
        </div>

        <div class="explorer-actions">
          <button class="btn btn-ghost" id="explorerCsvBtn">CSV Export</button>
          <span class="explorer-status" id="explorerStatus">Bereit.</span>
        </div>
      </div>
    </main>
  </div>

  <script src="/chart.min.js"></script>
  <script src="/hammer.min.js"></script>
  <script src="/chartjs-plugin-zoom.min.js"></script>
  <script src="/common.js"></script>
  <script src="/explorer.js"></script>
</body>
</html>
