<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DVhub Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0F1A">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/assets/dvhub.jpg" alt="DVhub Logo" style="width:28px;height:28px;border-radius:6px;object-fit:contain;">
        <span>DVhub</span>
      </div>
      <nav class="topbar-nav" aria-label="Hauptnavigation">
        <a href="/">Leitstand</a>
        <a href="/history.html">Historie</a>
        <a href="/explorer.html">Explorer</a>
        <a href="/settings.html">Einstellungen</a>
        <a class="is-active" href="/setup.html">Setup</a>
      </nav>
      <div class="topbar-right"></div>
    </header>

    <main class="page-content" style="max-width:800px;margin:0 auto;">
      <!-- Centered setup card -->
      <div class="sub-card" style="margin-top:24px;">
        <div style="text-align:center;margin-bottom:20px;">
          <p class="card-kicker" style="color:var(--chart-positive);">Ersteinrichtung</p>
          <h1 class="section-title" style="font-size:1.6rem;">DVhub einrichten</h1>
          <p class="meta" style="margin-top:6px;">Verbinde deine Anlage und starte DVhub in wenigen Schritten.</p>
        </div>

        <div id="setupBanner" class="status-banner" style="margin-bottom:12px;">Setup wird geladen...</div>
        <div id="setupMeta" class="meta" style="margin-bottom:16px;">-</div>
        <input id="setupImportFile" type="file" accept="application/json,.json" hidden />

        <div id="setup-shell" class="setup-shell">
          <!-- Step indicators (rendered by setup.js into #setup-steps) -->
          <div id="setup-steps" class="settings-sidebar-nav" style="justify-content:center;"></div>

          <!-- Progress (rendered by setup.js) -->
          <div id="setup-progress" class="setup-progress"></div>

          <!-- Main workspace -->
          <div id="setup-callout" class="setup-callout"></div>
          <div id="setup-errors" class="status-banner" hidden></div>
          <div id="setup-workspace" class="settings-workspace-panel"></div>

          <!-- Nav buttons (Weiter / Zurueck) -->
          <div id="setup-nav" class="panel-head" style="justify-content:space-between;margin-top:20px;"></div>
        </div>

        <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--flow-border);">
          <div style="display:flex;gap:8px;justify-content:center;">
            <button id="setupSaveBtn" class="btn btn-primary" type="button">Konfiguration pr&uuml;fen &amp; speichern</button>
            <button id="setupImportBtn" class="btn btn-ghost" type="button">Vorhandene Config importieren</button>
          </div>
          <p class="meta" style="margin-top:8px;">Oder <a href="/settings.html" style="color:var(--chart-positive);">direkt zu den Einstellungen</a></p>
        </div>
      </div>
    </main>
  </div>

  <script src="/common.js"></script>
  <script src="/setup.js"></script>
</body>
</html>
