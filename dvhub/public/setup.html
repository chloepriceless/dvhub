<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DVhub Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0F1A">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/assets/dvhub.jpg" alt="DVhub Logo" style="width:28px;height:28px;border-radius:6px;object-fit:contain;">
        <span>DVhub</span>
      </div>
      <nav class="topbar-nav" aria-label="Hauptnavigation">
        <a href="/">Leitstand</a>
        <a href="/history.html">Historie</a>
        <a href="/explorer.html">Explorer</a>
        <a href="/settings.html">Einstellungen</a>
        <a class="is-active" href="/setup.html">Setup</a>
      </nav>
      <div class="topbar-right"></div>
    </header>

    <main class="page-content">
      <!-- Page header -->
      <div class="page-header-card">
        <div class="panel-head">
          <div>
            <p class="card-kicker">Setup</p>
            <h1 class="section-title" style="font-size:1.4rem;">DVhub Inbetriebnahme</h1>
            <div id="setupBanner" class="status-banner" style="margin-top:6px;">Setup wird geladen...</div>
            <div id="setupMeta" class="meta">-</div>
          </div>
          <div class="controls" style="display:flex;gap:8px;">
            <button id="setupSaveBtn" class="btn btn-primary btn-small" type="button">Zur Pr&uuml;fung</button>
            <button id="setupImportBtn" class="btn btn-ghost btn-small" type="button">Config importieren</button>
          </div>
        </div>
      </div>
      <input id="setupImportFile" type="file" accept="application/json,.json" hidden />

      <!-- Setup wizard -->
      <div class="sub-card">
        <div id="setup-shell" class="setup-shell" style="display:flex;flex-direction:column;gap:16px;">

          <!-- Progress dots -->
          <div id="setup-progress" class="setup-progress" style="display:flex;justify-content:center;gap:12px;padding:12px 0;"></div>

          <!-- Step navigation (rendered by setup.js) -->
          <div id="setup-steps" style="display:none;"></div>

          <!-- Workspace -->
          <section class="setup-stage" style="min-height:300px;">
            <div id="setup-callout" class="setup-callout"></div>
            <div id="setup-errors" class="status-banner" hidden></div>
            <div id="setup-workspace" class="settings-workspace-panel"></div>
            <div id="setup-nav" class="panel-head" style="margin-top:16px;"></div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="/common.js"></script>
  <script src="/setup.js"></script>
</body>
</html>
