<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DVhub Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0F1A">
</head>
<body>
  <div class="app-shell">
    <header class="compact-topbar">
      <div class="topbar-brand">
        <img src="/assets/dvhub.jpg" alt="DVhub Logo" style="width:28px;height:28px;border-radius:6px;object-fit:contain;">
        <span>DVhub</span>
      </div>
      <input type="checkbox" id="menuToggle" class="menu-toggle-cb" aria-hidden="true">
      <label for="menuToggle" class="topbar-burger" aria-label="Menü öffnen">
        <span></span><span></span><span></span>
      </label>
      <nav class="topbar-nav" aria-label="Hauptnavigation">
        <a href="/">Leitstand</a>
        <a href="/settings.html">Einrichtung</a>
        <a href="/tools.html">Wartung</a>
      </nav>
      <div class="topbar-right"></div>
    </header>

    <main class="page-content">
      <div style="max-width:420px;margin:0 auto;padding:16px 16px 80px;">
        <div style="text-align:center;margin-bottom:20px;">
          <h1 style="font-family:var(--font-title);font-size:22px;font-weight:600;margin-bottom:4px;">Victron-Anlage verbinden</h1>
          <p style="font-size:13px;color:rgba(232,234,240,0.4);">Hersteller und IP-Adresse eingeben</p>
        </div>

        <div style="text-align:center;margin:16px 0 20px;padding:16px;border:1px solid rgba(0,168,255,0.15);border-radius:10px;">
          <h2 style="font-family:var(--font-title);font-size:17px;font-weight:600;margin:0 0 6px;">Geführter Einstieg</h2>
          <p style="font-size:13px;color:rgba(232,234,240,0.5);margin:0 0 10px;">Dieser Assistent richtet die Victron-Anbindung ein. Für die vollständige Einrichtung aller Optionen:</p>
          <a href="/settings.html" class="btn btn-ghost" style="font-size:13px;">Zur Einrichtung</a>
        </div>

        <div id="setupBanner" class="config-banner warn">Setup wird geladen...</div>

        <div id="setupGrid"></div>

        <div id="setupImportRow" style="text-align:center;margin-top:16px;">
          <p style="font-size:11px;color:rgba(232,234,240,0.25);">Oder <a id="setupImportLink" href="#" style="color:#4CE36C;text-decoration:none;">vorhandene Config importieren</a></p>
          <input id="setupImportFile" type="file" accept="application/json,.json" hidden />
        </div>
      </div>

      <div class="config-save-bar" style="justify-content:center;gap:12px;">
        <span class="config-save-bar-text" id="setupSaveBarText">-</span>
        <button id="setupSaveBtn" class="btn btn-primary" style="padding:10px 28px;font-size:13px;font-weight:600;">Konfiguration speichern</button>
      </div>
    </main>
  </div>

  <script src="/common.js"></script>
  <script src="/setup.js"></script>
</body>
</html>
