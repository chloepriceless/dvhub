<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVhub API Dokumentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .topbar { display: none !important; }
    .swagger-ui .info { margin: 20px 0 16px; }
    .swagger-ui .info .title { font-size: 1.8em; }
    .back-link { display: block; padding: 12px 24px; background: #1d1d1f; color: #a1a1a6; font-size: 0.85em; text-decoration: none; }
    .back-link:hover { color: #fff; }
    .back-link span { color: #0088e8; margin-right: 8px; }
  </style>
</head>
<body>
  <a href="/" class="back-link"><span>&larr;</span> Zurück zum Dashboard</a>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: '/openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      defaultModelsExpandDepth: -1,
      docExpansion: 'list',
      tryItOutEnabled: true
    });
  </script>
</body>
</html>
